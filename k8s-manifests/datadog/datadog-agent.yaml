apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
spec:
  global:
    clusterName: storedog-k8s
    site: datadoghq.com
    kubelet:
      tlsVerify: false
    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key
      appSecret:
        secretName: datadog-secret
        keyName: app-key
    tags:
      - "env:apm-workshop"
  override:
    nodeAgent:
      image:
        tag: 7.74.1
    clusterAgent:
      image:
        tag: 7.74.1
  features:
    logCollection: # Logs
      enabled: true
      containerCollectAll: true
