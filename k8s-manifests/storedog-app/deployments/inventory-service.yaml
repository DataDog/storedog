apiVersion: v1
kind: Service
metadata:
  name: inventory-service
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: inventory-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  labels:
    app: inventory-service
    component: data-streams
    service-type: consumer-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        component: data-streams
        service-type: consumer-producer
        team: data-platform
      annotations:
        ad.datadoghq.com/inventory-service.logs: '[{"source": "java"}]'
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.37.0
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done;']
      containers:
        - name: inventory-service
          image: localhost:5000/kafka-consumer:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CONSUME_SERVER
              valueFrom:
                configMapKeyRef:
                  name: data-streams-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_PRODUCE_SERVER
              valueFrom:
                configMapKeyRef:
                  name: data-streams-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: TOPICS_IN
              value: "validated-orders"
            - name: TOPICS_OUT
              value: "inventory-reserved,inventory-unavailable"
            - name: CONSUMER_GROUP
              value: "inventory-service-group"
            - name: PROCESSING_TIME_MS_MIN
              value: "100"
            - name: PROCESSING_TIME_MS_MAX
              value: "200"
            - name: ERROR_RATE_PERCENT
              value: "5"
            - name: DD_ENV
              valueFrom:
                configMapKeyRef:
                  name: data-streams-config
                  key: DD_ENV
            - name: DD_DATA_STREAMS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: data-streams-config
                  key: DD_DATA_STREAMS_ENABLED
            - name: DD_SERVICE_NAME
              value: "inventory-service"
            - name: DD_VERSION
              value: "1.0.0"
            - name: DD_SERVICE_MAPPING
              value: "kafka:inventory-service"
            - name: DD_TAGS
              value: "service_type:inventory,pipeline_stage:inventory_reservation"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
