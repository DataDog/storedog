apiVersion: v1
kind: Service
metadata:
  name: fulfillment-service
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: fulfillment-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fulfillment-service
  labels:
    app: fulfillment-service
    component: data-streams
    service-type: consumer-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fulfillment-service
  template:
    metadata:
      labels:
        app: fulfillment-service
        component: data-streams
        service-type: consumer-producer
        team: data-platform
      annotations:
        ad.datadoghq.com/fulfillment-service.logs: '[{"source": "java"}]'
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.37.0
          command: ['sh', '-c', 'until nc -z kafka 9092; do echo waiting for kafka; sleep 2; done;']
      containers:
        - name: fulfillment-service
          image: localhost:5000/kafka-consumer:1.0.0
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CONSUME_SERVER
              valueFrom:
                configMapKeyRef:
                  name: data-streams-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: KAFKA_PRODUCE_SERVER
              valueFrom:
                configMapKeyRef:
                  name: data-streams-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: TOPICS_IN
              value: "payment-confirmed"
            - name: TOPICS_OUT
              value: "order-fulfilled,shipment-created,warehouse-assigned"
            - name: CONSUMER_GROUP
              value: "fulfillment-service-group"
            - name: PROCESSING_TIME_MS_MIN
              value: "150"
            - name: PROCESSING_TIME_MS_MAX
              value: "300"
            - name: ERROR_RATE_PERCENT
              value: "4"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
