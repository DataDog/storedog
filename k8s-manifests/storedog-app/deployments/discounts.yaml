apiVersion: v1
kind: Service
metadata:
  name: discounts
  namespace: storedog
spec:
  ports:
    - port: 2814
      targetPort: 2814
      name: http
  selector:
    app: discounts
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discounts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discounts
  template:
    metadata:
      labels:
        app: discounts
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.37.0
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;']
      containers:
        - name: discounts
          image: ${REGISTRY_URL}/discounts:${SD_TAG}
          ports:
            - containerPort: 2814
          env:
            # Flask Application Configuration
            - name: FLASK_APP
              value: "discounts.py"
            - name: DISCOUNTS_PORT
              value: "2814"
            - name: FLASK_DEBUG
              value: "0"
            # Flask Binding Configuration - Fix for HTTP 308 redirects
            - name: FLASK_ENV
              value: "production"
            - name: FLASK_HOST
              value: "0.0.0.0"
            - name: FLASK_PORT
              value: "2814"
            # Database Configuration
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: storedog-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: storedog-config
                  key: POSTGRES_USER
            - name: POSTGRES_HOST
              value: postgres
            # OpenTelemetry configuration (override Dockerfile to use HTTP for consistency)
            - name: OTEL_SERVICE_NAME
              value: "discounts"
            - name: OTEL_SERVICE_VERSION
              value: ${DD_VERSION_DISCOUNTS}
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTLP_GRPC_PORT
              value: "4317"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: '$(HOST_IP):$(OTLP_GRPC_PORT)'
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: 'grpc'
            - name: OTEL_TRACES_EXPORTER
              value: otlp
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=discounts,service.version=${DD_VERSION_DISCOUNTS},service.namespace=storedog,deployment.environment=${DD_ENV}"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          # Health probes for better monitoring
          readinessProbe:
            httpGet:
              path: /
              port: 2814
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 2814
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
