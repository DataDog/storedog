apiVersion: v1
kind: Service
metadata:
  name: ads-java
spec:
  ports:
    - port: 3030
      targetPort: 3030
      name: http
  selector:
    app: ads-java
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ads-java
  labels:
    app: ads-java
    team: advertisements
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ads-java
  template:
    metadata:
      labels:
        app: ads-java
        team: advertisements
      annotations:
        ad.datadoghq.com/ads.logs: '[{"source": "java"}]'
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.37.0
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;']
      containers:
        - name: ads-java
          image: localhost:5000/ads-java:1.8.6
          ports:
            - containerPort: 3030
          env:
            - name: AD_PROVIDER_URL
              value: "http://ad-provider.external.svc.cluster.local:8081"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
