# Storedog Development Environment
# This docker-compose file sets up a complete development environment for the Storedog application.
services:
  # OpenTelemetry Collector for observability
  otelcol:
    container_name: otelcol
    hostname: otelcol
    image: otel/opentelemetry-collector-contrib:0.130.0
    environment:
      - OTEL_LOG_LEVEL=debug
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - storedog-network
    restart: unless-stopped
    command:
      - "--config=/etc/otelcol-config.yaml"
    volumes:
      - ./services/otel/otelcol-config.yaml:/etc/otelcol-config.yaml
    ports:
      - 4317:4317
      - 4318:4318

  # Frontend service (Next.js)
  frontend:
    build:
      context: ./services/frontend
    command: bash -c "wait-for-it backend:4000 -- ${FRONTEND_COMMAND:-npm run dev}"
    depends_on:
      - worker
      - backend
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    networks:
      - storedog-network
    environment:
      - NEXT_PUBLIC_ADS_ROUTE=${NEXT_PUBLIC_ADS_ROUTE:-/services/ads}
      - NEXT_PUBLIC_DISCOUNTS_ROUTE=${NEXT_PUBLIC_DISCOUNTS_ROUTE:-/services/discounts}
      - NEXT_PUBLIC_DBM_ROUTE=${NEXT_PUBLIC_DBM_ROUTE:-/services/dbm}
      - NEXT_PUBLIC_FRONTEND_API_ROUTE=${NEXT_PUBLIC_FRONTEND_API_ROUTE:-http://localhost:3000}
      - NEXT_PUBLIC_SPREE_API_HOST=${NEXT_PUBLIC_SPREE_API_HOST:-http://service-proxy/services/backend}
      - NEXT_PUBLIC_SPREE_CLIENT_HOST=${NEXT_PUBLIC_SPREE_CLIENT_HOST:-/services/backend}
      - NEXT_PUBLIC_SPREE_IMAGE_HOST=${NEXT_PUBLIC_SPREE_IMAGE_HOST:-/services/backend}
      - NEXT_PUBLIC_SPREE_ALLOWED_IMAGE_DOMAIN=${NEXT_PUBLIC_SPREE_ALLOWED_IMAGE_DOMAIN:-service-proxy}

  # Backend service (Ruby on Rails/Spree)
  backend:
    build:
      context: ./services/backend
    command: wait-for-it postgres:5432 -- bundle exec rails s -b 0.0.0.0 -p 4000 --pid /app/tmp/pids/server.pid
    depends_on:
      - 'postgres'
      - 'redis'
    networks:
      - storedog-network
    volumes:
      - './services/backend:/app'
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD-postgres}
      - DISABLE_SPRING=1
      - RAILS_ENV=${RAILS_ENV:-production}
      - DB_POOL=${DB_POOL:-25}
      - MAX_THREADS=${MAX_THREADS:-5}

  # Background job processor (Sidekiq)
  worker:
    build:
      context: ./services/backend
    command: wait-for-it postgres:5432 -- bundle exec sidekiq -C config/sidekiq.yml
    depends_on:
      - 'postgres'
      - 'redis'
      - 'backend'
    networks:
      - storedog-network
    volumes:
      - ./services/backend:/app
    environment:
      # this will never not be true
      - WORKER=true
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DISABLE_SPRING=1
      - DB_POOL=${DB_POOL:-25}
      - MAX_THREADS=${MAX_THREADS:-5}

  # Discounts service (Python/Flask)
  discounts:
    build:
      context: ./services/discounts
    command: wait-for-it postgres:5432 -- opentelemetry-instrument flask run --port=2814 --host=0.0.0.0
    depends_on:
      - postgres
    environment:
      - FLASK_APP=discounts.py
      - FLASK_DEBUG=0
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_HOST=postgres
    volumes:
      - ./services/discounts:/app
    networks:
      - storedog-network

  # Advertisement service (Java)
  ads:
    build:
      context: ./services/ads/java
    depends_on:
      - postgres
      - otelcol
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_HOST=postgres
      # OpenTelemetry configuration
      - OTEL_SERVICE_NAME=store-ads
      - OTEL_SERVICE_VERSION=1.0.0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otelcol:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_RESOURCE_ATTRIBUTES=service.name=store-ads,service.version=1.0.0,deployment.environment=development
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_LOG_LEVEL=debug
    networks:
      - storedog-network

  # OPTIONAL: Advertisement service (Python)
  # ads-python:
  #   build:
  #     context: ./services/ads/python
  #   depends_on:
  #     - postgres
  #   environment:
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
  #     - POSTGRES_USER=${POSTGRES_USER:-postgres}
  #     - POSTGRES_HOST=postgres
  #   networks:
  #     - storedog-network

  # Web server and reverse proxy
  service-proxy:
    build:
      context: ./services/nginx
    restart: always
    ports:
      - '80:80'
    networks:
      - storedog-network
    depends_on:
      - frontend
    environment:
      - ADS_A_UPSTREAM=${ADS_A_UPSTREAM:-ads:3030} # Only needed if using AB testing
      - ADS_B_UPSTREAM=${ADS_B_UPSTREAM:-ads-python:3030} # Only needed if using AB testing
      - ADS_B_PERCENT=${ADS_B_PERCENT:-0} # Percent of traffic to ads-python; remainder goes to ads-java. Only needed if using AB testing

  # Primary database
  postgres:
    build:
      context: ./services/postgres
    restart: always
    volumes:
      - postgres_logs:/var/log/pg_log:rw
    networks:
      - storedog-network
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}

  # Cache and job queue
  redis:
    image: redis:6.2-alpine
    volumes:
      - 'redis:/data'
    networks:
      - storedog-network

  # Browser automation for testing
  puppeteer:
    build:
      context: ./services/puppeteer
    platform: linux/amd64
    environment:
      - STOREDOG_URL=${STOREDOG_URL:-http://service-proxy:80}
      - PUPPETEER_TIMEOUT=${PUPPETEER_TIMEOUT:-30000}
      - SKIP_SESSION_CLOSE=${SKIP_SESSION_CLOSE:-false}
    networks:
      - storedog-network
    volumes:
      - ./services/puppeteer/scripts/puppeteer.js:/home/pptruser/puppeteer.js
    depends_on:
      - frontend
    shm_size: '4gb' # Increase shared memory size
    cap_add:
      - 'SYS_ADMIN' # Required for Puppeteer to run in Docker

volumes:
  redis: # Redis data persistence
  postgres_logs: # PostgreSQL logs storage

networks:
  storedog-network: # Main application network
