services:
  frontend:
    # image: ghcr.io/datadog/storedog/frontend:${STOREDOG_IMAGE_VERSION:-latest}
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      target: development
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3000"]
      interval: 3s
      start_period: 60s
    ports:
      - '3000:3000'
    networks:
      - storedog-network
    environment:
      - NEXT_PUBLIC_DD_ENV=${NEXT_PUBLIC_DD_ENV:-production}
      - NEXT_PUBLIC_DD_VERSION_FRONTEND=${NEXT_PUBLIC_DD_VERSION_FRONTEND:-1.0.0}
      - NEXT_PUBLIC_DD_SERVICE_FRONTEND=${NEXT_PUBLIC_DD_SERVICE_FRONTEND:-store-frontend}
      - NEXT_PUBLIC_DD_SITE=${NEXT_PUBLIC_DD_SITE:-datadoghq.com}
      - NEXT_PUBLIC_DD_APPLICATION_ID=${NEXT_PUBLIC_DD_APPLICATION_ID:-not-set-in-docker-compose}
      - NEXT_PUBLIC_DD_CLIENT_TOKEN=${NEXT_PUBLIC_DD_CLIENT_TOKEN:-not-set-in-docker-compose}
    labels:
      com.datadoghq.ad.logs: '[{"source": "nodejs", "auto_multi_line_detection": true }]'
  service-proxy:
    image: ghcr.io/datadog/storedog/nginx:${STOREDOG_IMAGE_VERSION:-latest}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81/nginx_status/"]
      interval: 3s
      start_period: 30s
    ports:
      - '80:80'
    networks:
      - storedog-network
    depends_on:
      frontend:
        condition: service_healthy
  backend:
    image: ghcr.io/datadog/storedog/backend:${STOREDOG_IMAGE_VERSION:-latest}
    command: /bin/bash -c "rm -f /app/tmp/pids/server.pid && bundle exec rails s -b 0.0.0.0 -p 4000"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4000"]
      interval: 3s
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - storedog-network
    environment:
      - RAILS_ENV=production
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_HOST=postgres
  worker:
    image: ghcr.io/datadog/storedog/backend:${STOREDOG_IMAGE_VERSION:-latest}
    command: bundle exec sidekiq -C config/sidekiq.yml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "pgrep", "-f", "sidekiq"]
      interval: 3s
      start_period: 60s
    networks:
      - storedog-network
    environment:
      # this will never not be true
      - WORKER=true
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_HOST=postgres
  discounts:
    image: ghcr.io/datadog/storedog/discounts:${STOREDOG_IMAGE_VERSION:-latest}
    command: flask run --port=2814 --host=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - storedog-network
  ads:
    image: ghcr.io/datadog/storedog/ads-java:${STOREDOG_IMAGE_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_HOST=postgres
    networks:
      - storedog-network
  postgres:
    image: ghcr.io/datadog/storedog/postgres:${STOREDOG_IMAGE_VERSION:-latest}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres && psql -U ${POSTGRES_USER:-postgres} -d postgres -c 'SELECT 1;' > /dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - storedog-network
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
  redis:
    image: redis:6.2-alpine
    networks:
      - storedog-network

volumes:
  redis: # Redis data persistence
  postgres_logs: # PostgreSQL logs storage

networks:
  storedog-network: # Main application network