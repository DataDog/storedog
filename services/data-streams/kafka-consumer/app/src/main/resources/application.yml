spring:
  application:
    name: kafka-consumer
  kafka:
    consumer:
      bootstrap-servers: ${KAFKA_CONSUME_SERVER:kafka:9092}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
      enable-auto-commit: true
      auto-commit-interval: 1000
      fetch-min-size: ${KAFKA_CONSUMER_FETCH_MIN_BYTES:1024}
      fetch-max-wait: ${KAFKA_CONSUMER_FETCH_MAX_WAIT_MS:500}
    producer:
      bootstrap-servers: ${KAFKA_PRODUCE_SERVER:kafka:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      acks: 1
      retries: 3

server:
  port: 8080

logging:
  level:
    datadog.kafka.example: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
