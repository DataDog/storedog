apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
spec:
  global:
    secretBackend:
      command: "/readsecret_multiple_providers.sh"
      enableGlobalPermissions: true
    clusterName: storedog-k8s
    site: datadoghq.com
    kubelet:
      tlsVerify: false
    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key
      appSecret:
        secretName: datadog-secret
        keyName: app-key
  features:
    logCollection: # Logs
      enabled: true
      containerCollectAll: true
    clusterChecks: # Required for integrations
      enabled: true
    # Datadog security features
    # cspm: # Cloud Security Posture Management
    #   enabled: true
    #   hostBenchmarks:
    #     enabled: true
    # cws: # Cloud Workload Security
    #   enabled: true
    # sbom: # Software Bill of Materials
    #   enabled: true
    #   containerImage:
    #     enabled: true
  override:
    # Deploy the Datadog agent to the control plane nodes.
    # Used to monitor pods running on the control plane nodes.
    # This is required for etcd integration.
    nodeAgent:
      # Control-plane override: tolerations only, no Postgres log mounts/config
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        agent:
          volumeMounts:
            - name: etcd-certs # Used for etcd integration
              readOnly: true
              mountPath: /host/etc/kubernetes/pki/etcd
            - name: disable-etcd-autoconf # Used for etcd integration
              mountPath: /etc/datadog-agent/conf.d/etcd.d
          env:
      volumes:
        - name: etcd-certs # Used for etcd integration
          hostPath:
            path: /etc/kubernetes/pki/etcd
        - name: disable-etcd-autoconf
          emptyDir: {}
      extraConfd:
        configDataMap: # Integration configurations
          etcd.yaml: |- # etcd integration
            ad_identifiers:
              - etcd
            init_config:
            instances:
              - prometheus_url: https://%%host%%:2379/metrics
                tls_ca_cert: /host/etc/kubernetes/pki/etcd/ca.crt
                tls_cert: /host/etc/kubernetes/pki/etcd/server.crt
                tls_private_key: /host/etc/kubernetes/pki/etcd/server.key
          nginx_ingress_controller.yaml: |- # nginx-ingress-controller integration
            ad_identifiers:
              - controller
            init_config:
            instances:
              - prometheus_url: http://%%host%%:10254/metrics
                collect_nginx_histograms: true
            logs:
              - service: controller
                source: nginx-ingress-controller
          nginx.yaml: |- # nginx integration on the nginx-ingress-controller
            ad_identifiers:
              - controller
            init_config:
            instances:
              - nginx_status_url: http://%%host%%:18080/nginx_status
    # Add worker node override for Postgres log collection
    nodeAgent-worker:
      nodeSelector:
        node-role: worker
      containers:
        agent:
          volumeMounts:
            - name: postgres-logs # For Postgres log collection
              mountPath: /var/log/pg_log
              readOnly: true
            - name: shared-pg-logs # For shared NFS log collection
              mountPath: /var/log/pg_log_shared
              readOnly: true
      volumes:
        - name: postgres-logs # For Postgres log collection
          hostPath:
            path: /var/log/pg_log
        - name: shared-pg-logs # For shared NFS log collection
          persistentVolumeClaim:
            claimName: shared-pg-logs
      extraConfd:
        configDataMap:
          postgres.yaml: |-
            logs:
              - type: file
                path: /var/log/pg_log/postgresql-*.json
                service: store-db
                source: postgresql
          postgres-shared.yaml: |-
            logs:
              - type: file
                path: /var/log/pg_log_shared/postgresql-*.json
                service: store-db
                source: postgresql
    clusterAgent:
      extraConfd:
        configDataMap:
          postgres.yaml: |-
            cluster_check: true
            init_config:
            instances:
              - dbm: true
                host: postgres.storedog
                port: 5432
                username: ENC[k8s_secret@default/storedog-secrets/POSTGRES_INTEGRATION_USER]
                password: ENC[k8s_secret@default/storedog-secrets/POSTGRES_INTEGRATION_PASSWORD]
                tags:
                  - env:development
                  - service:store-db
                relations:
                  - relation_name: advertisement
                  - relation_name: discount
                  - relation_name: items
                  - relation_name: preorder_items
                  - relation_name: influencer
                query_samples:
                  enabled: true
                  explain_parameterized_queries: true
                max_relations: 400
                collect_function_metrics: true
                collection_interval: 1
                collect_schemas:
                  enabled: true
              - dbm: true
                host: postgres.storedog
                port: 5432
                username: ENC[k8s_secret@default/storedog-secrets/POSTGRES_INTEGRATION_USER]
                password: ENC[k8s_secret@default/storedog-secrets/POSTGRES_INTEGRATION_PASSWORD]
                dbname: storedog_db
                relations:
                  - relation_regex: spree_.*
                query_samples:
                  enabled: true
                  explain_parameterized_queries: true
                max_relations: 400
                collect_function_metrics: true
                collection_interval: 1
                collect_schemas:
                  enabled: true
