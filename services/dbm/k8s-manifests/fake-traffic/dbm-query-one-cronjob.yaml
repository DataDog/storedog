apiVersion: batch/v1
kind: CronJob
metadata:
  name: dbm-query-one
  namespace: fake-traffic
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: dbm-query-one
            image: postgres:15-alpine
            command: ["/bin/sh", "/scripts/dbm_query_one.sh"]
            envFrom:
            - configMapRef:
                name: storedog-config
            - configMapRef:
                name: dbm-env
            volumeMounts:
            - name: scripts
              mountPath: /scripts
          restartPolicy: OnFailure
          volumes:
          - name: scripts
            configMap:
              name: dbm-scripts
              defaultMode: 0755 