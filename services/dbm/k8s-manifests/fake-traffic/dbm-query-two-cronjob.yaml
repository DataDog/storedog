apiVersion: batch/v1
kind: CronJob
metadata:
  name: dbm-query-two
  namespace: fake-traffic
spec:
  schedule: "*/2 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: dbm-query-two
            image: ${REGISTRY_URL}/postgres:${SD_TAG}
            command: ["/bin/sh", "/scripts/dbm_query_two.sh"]
            envFrom:
            - configMapRef:
                name: storedog-config
            - configMapRef:
                name: dbm-env
            volumeMounts:
            - name: scripts
              mountPath: /scripts
          restartPolicy: OnFailure
          volumes:
          - name: scripts
            configMap:
              name: dbm-scripts
              defaultMode: 0755 